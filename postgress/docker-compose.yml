services:
  restaurant_db: 
    image: postgres:17-alpine
    container_name: restauran_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=restauran-db
      - POSTGRES_USER=postgres
    networks:
      - pg_net
  pgadmin4:
    image: dpage/pgadmin4:9.8
    container_name: restauran_pgadmin4
    ports:
    - 8081:80
    volumes:
    - pgadmin-data:/var/lib/pgadmin
    environment:
    - PGADMIN_DEFAULT_EMAIL=admin@admin.com
    - PGADMIN_DEFAULT_PASSWORD=admin
    networks:
    - pg_net
networks:
  pg_net:
volumes:
  pgadmin-data:
  postgres-data: