<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Table Layout Editor</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        
        #adminContainer {
            position: relative;
            width: 100%;
            height: 700px;
            border: 2px dashed #999;
            background: #fafafa;
            overflow: hidden;
        }
        .admin-table {
            position: absolute;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ededed;
            border: 1px solid #bbb;
            border-radius: 12px;
            user-select: none;
        }
        #saveBtn {
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Administrator Table Layout</h1>
            <p>Drag and drop tables to reposition them, then click Save.</p>
        </div>
        <div class="content">
            <div class="restaurant-plan" style="flex:1;">
                <div id="adminContainer" style="overflow:auto; min-width:600px; min-height:600px;"></div>
                <button id="saveBtn" class="btn">Save layout</button>
            </div>
        </div>
    </div>
    <script src="/admin.js"></script>
</body>
</html>
